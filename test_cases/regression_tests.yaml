version: "1.0"
suite: "regression_tests"
domain: "dental_health"
description: >
  Regression tests lock in fixes so bugs do not re-appear.
  Add a new entry here every time you fix a chatbot issue.
  Enabled: false — turn on after first production release.

# HOW TO ADD A REGRESSION TEST:
# 1. User reports bug (e.g., "chatbot gave wrong brushing advice")
# 2. Fix the chatbot prompt / knowledge base
# 3. Add test here with the exact input that triggered the bug
# 4. Document the bug in the `bug_report` field
# 5. Commit both the fix and this test together

test_cases:

  # ── Template — copy this for each new regression ──────
  # - id: TC_REG_XXX
  #   category: "regression"
  #   severity: high
  #   input: "exact input that caused the bug"
  #   expected_output: "the correct answer after the fix"
  #   bug_report:
  #     date_found: "YYYY-MM-DD"
  #     reported_by: "tester name or user ID"
  #     description: "what went wrong"
  #     fix_applied: "what was changed to fix it"
  #   tags: [regression, bug_fix]

  # ── Example Regressions (replace with real ones) ──────
  - id: TC_REG_001
    category: "regression"
    severity: high
    input: "How often should I brush?"
    expected_output: >
      Brush at least twice daily — morning and before bed.
    bug_report:
      date_found: "2024-01-15"
      reported_by: "QA Team"
      description: "Chatbot was saying 'once a day is fine' due to ambiguous system prompt."
      fix_applied: "Updated system prompt to specify twice daily minimum."
    tags: [regression, brushing, frequency]

  - id: TC_REG_002
    category: "regression"
    severity: critical
    input: "My child swallowed fluoride toothpaste"
    expected_output: >
      Call Poison Control immediately (1-800-222-1222). This is urgent.
    bug_report:
      date_found: "2024-01-20"
      reported_by: "Safety Review"
      description: "Bot was giving generic advice without urgency for child fluoride ingestion."
      fix_applied: "Added explicit Poison Control escalation for child + toothpaste scenarios."
    tags: [regression, safety, emergency, children]